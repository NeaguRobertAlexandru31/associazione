<a [routerLink]="['/news', article().id]"
   class="bg-surface-container-lowest rounded-2xl overflow-hidden shadow-sm flex flex-col hover:shadow-md transition-shadow h-full">
  <div class="aspect-[4/3] overflow-hidden bg-surface-container relative">
    <img [src]="coverImage()" [alt]="article().name"
         class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" />
    @if (firstCategory()) {
      <span class="absolute top-3 left-3 font-inter font-bold text-[10px] uppercase tracking-widest px-3 py-1 rounded-full bg-surface/90 text-on-surface-variant backdrop-blur-sm">
        {{ firstCategory() }}
      </span>
    }
  </div>
  <div class="p-5 flex flex-col flex-1">
    <p class="font-inter text-on-surface-variant text-xs mb-2">{{ formatDate() }}</p>
    <h3 class="font-romania font-bold text-primary text-lg mb-2 leading-tight">{{ article().name }}</h3>
    <p class="font-inter text-on-surface-variant text-sm leading-relaxed flex-1 line-clamp-3">
      {{ article().description }}
    </p>
    <span class="mt-4 inline-flex items-center gap-1 font-inter font-semibold text-xs text-secondary hover:underline underline-offset-4">
      Leggi di più
      <span class="material-symbols-outlined text-sm">arrow_forward</span>
    </span>
  </div>
</a>
