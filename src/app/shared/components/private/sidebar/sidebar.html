<aside class="flex flex-col w-64 bg-primary h-full">

  <!-- Logo -->
  <div class="px-6 py-6 border-b border-on-primary/10 flex-shrink-0">
    <a routerLink="/home" class="font-romania font-extrabold text-on-primary text-xl tracking-tight hover:opacity-80 transition-opacity block">
      A.C.R.
    </a>
    <p class="font-inter text-on-primary/50 text-xs mt-0.5">Pannello di Controllo</p>
  </div>

  <!-- Nav -->
  <nav class="flex-1 px-3 py-4 flex flex-col gap-1 overflow-y-auto">
    @for (item of items; track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="bg-on-primary/15 text-on-primary"
         [routerLinkActiveOptions]="{ exact: false }"
         (click)="itemClick.emit()"
         class="flex items-center gap-3 px-4 py-3 rounded-xl font-inter font-semibold text-sm transition-all text-on-primary/60 hover:bg-on-primary/10 hover:text-on-primary">
        <span class="material-symbols-outlined text-xl" style="font-variation-settings:'FILL' 1">{{ item.icon }}</span>
        {{ item.label }}
        @if (item.badge && item.badge > 0) {
          <span class="ml-auto bg-secondary text-on-primary font-inter font-bold text-[10px] px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
            {{ item.badge }}
          </span>
        }
      </a>
    }
  </nav>

  <!-- User + logout -->
  <div class="px-3 py-4 border-t border-on-primary/10 flex-shrink-0">
    @if (user) {
      <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-on-primary/8 mb-2">
        <div class="w-8 h-8 rounded-full bg-[#f8bd2a] flex items-center justify-center flex-shrink-0">
          <span class="font-romania font-bold text-[#261a00] text-sm">{{ user.name[0] }}</span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-inter font-semibold text-on-primary text-xs truncate">{{ user.name }}</p>
          <p class="font-inter text-on-primary/50 text-[10px] truncate">{{ user.email }}</p>
        </div>
      </div>
    }
    <button (click)="logoutClick.emit()"
      class="w-full flex items-center gap-2 px-4 py-2.5 rounded-xl font-inter font-semibold text-sm text-on-primary/60 hover:text-on-primary hover:bg-on-primary/10 transition-all">
      <span class="material-symbols-outlined text-base">logout</span>
      Esci
    </button>
  </div>

</aside>
