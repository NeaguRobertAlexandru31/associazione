@if (active()) {
  <div class="toolbar-container">
    <div class="flex items-center gap-4 bg-surface border border-outline-variant rounded-2xl shadow-2xl px-5 py-3">

      <span class="font-inter font-semibold text-sm text-on-surface">
        {{ count() }} {{ count() === 1 ? 'elemento selezionato' : 'elementi selezionati' }}
      </span>

      <div class="w-px h-5 bg-outline-variant"></div>

      <button
        (click)="delete.emit()"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-inter font-semibold text-error hover:bg-error/10 transition-colors">
        <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">delete</span>
        Elimina
      </button>

    </div>
  </div>
}
