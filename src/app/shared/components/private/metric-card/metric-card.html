<div class="bg-surface-container-lowest rounded-2xl p-5 shadow-sm flex flex-col gap-3">
  <div class="w-10 h-10 rounded-xl bg-primary/8 flex items-center justify-center">
    <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings:'FILL' 1">{{ icon() }}</span>
  </div>
  <div>
    @if (loading()) {
      <div class="h-9 w-20 bg-surface-container rounded-lg animate-pulse mb-1"></div>
    } @else {
      <div class="font-romania font-extrabold text-primary text-3xl">{{ value() }}</div>
    }
    <div class="font-inter font-semibold text-on-surface-variant text-xs uppercase tracking-wider mt-0.5">{{ label() }}</div>
  </div>
  <p class="font-inter text-xs" [class]="positive() ? 'text-green-600' : 'text-on-surface-variant'">{{ delta() }}</p>
</div>
