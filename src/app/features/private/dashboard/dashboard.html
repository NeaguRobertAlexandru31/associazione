<div class="min-h-screen bg-surface-container-low flex">

  <!-- Desktop sidebar -->
  <div class="hidden md:block sticky top-0 h-screen flex-shrink-0">
    <app-sidebar
      [items]="navItems()"
      [user]="user()"
      (logoutClick)="logout()" />
  </div>

  <div class="flex-1 flex flex-col min-w-0">

    <!-- Mobile top bar -->
    <app-private-navbar
      (menuClick)="sidebarOpen.set(true)"
      (logoutClick)="logout()" />

    <!-- Mobile sidebar overlay -->
    @if (sidebarOpen()) {
      <div class="md:hidden fixed inset-0 z-50 flex">
        <div class="sidebar-animate h-full">
          <app-sidebar
            [items]="navItems()"
            [user]="user()"
            (logoutClick)="logout()"
            (itemClick)="sidebarOpen.set(false)" />
        </div>
        <div class="flex-1 bg-black/40 backdrop-blur-sm" (click)="sidebarOpen.set(false)"></div>
      </div>
    }

    <!-- Routed content -->
    <main class="flex-1 p-6 md:p-8">
      <router-outlet />
    </main>

  </div>
</div>
