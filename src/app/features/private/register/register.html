<div class="min-h-screen bg-surface flex items-center justify-center p-4 relative overflow-hidden">

  <div class="absolute inset-0 pointer-events-none opacity-[0.04]"
       style="background-image: radial-gradient(circle at 2px 2px, #b6171e 1px, transparent 0); background-size: 28px 28px;"></div>
  <div class="absolute -top-40 -right-40 w-96 h-96 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>

  <div class="register-card relative z-10 w-full max-w-sm">

    <div class="bg-surface-container-lowest rounded-3xl shadow-xl border border-outline-variant/20 p-8">

      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary mb-4">
          <span class="material-symbols-outlined text-on-primary text-2xl" style="font-variation-settings:'FILL' 1">person_add</span>
        </div>
        <h1 class="font-romania font-extrabold text-primary text-2xl tracking-tight">A.C.R.</h1>
        <p class="font-inter text-on-surface-variant text-sm mt-1">Crea il tuo account admin</p>
      </div>

      @if (success()) {
        <div class="flex flex-col items-center gap-3 py-6">
          <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center">
            <span class="material-symbols-outlined text-green-600 text-3xl" style="font-variation-settings:'FILL' 1">check_circle</span>
          </div>
          <p class="font-inter font-semibold text-on-surface text-sm">Registrazione completata!</p>
          <p class="font-inter text-on-surface-variant text-xs">Accesso in corso…</p>
        </div>
      } @else {

        @if (error()) {
          <div class="register-error flex items-center gap-2 bg-secondary/10 text-secondary border border-secondary/20 rounded-xl px-4 py-3 mb-5 font-inter text-sm">
            <span class="material-symbols-outlined text-base flex-shrink-0" style="font-variation-settings:'FILL' 1">error</span>
            {{ error() }}
          </div>
        }

        <form (ngSubmit)="submit()" class="flex flex-col gap-4">
          <div>
            <label class="font-inter font-semibold text-[10px] text-on-surface-variant uppercase tracking-widest block mb-2">Nome e Cognome</label>
            <input type="text" [(ngModel)]="name" name="name" required placeholder="Mario Rossi"
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface font-inter text-sm focus:outline-none focus:border-primary transition-colors placeholder:text-on-surface-variant/40" />
          </div>
          <div>
            <label class="font-inter font-semibold text-[10px] text-on-surface-variant uppercase tracking-widest block mb-2">Email</label>
            <input type="email" [(ngModel)]="email" name="email" required placeholder="mario@acr.it"
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface font-inter text-sm focus:outline-none focus:border-primary transition-colors placeholder:text-on-surface-variant/40" />
          </div>
          <div>
            <label class="font-inter font-semibold text-[10px] text-on-surface-variant uppercase tracking-widest block mb-2">Password</label>
            <input type="password" [(ngModel)]="password" name="password" required placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface font-inter text-sm focus:outline-none focus:border-primary transition-colors placeholder:text-on-surface-variant/40" />
          </div>
          <div>
            <label class="font-inter font-semibold text-[10px] text-on-surface-variant uppercase tracking-widest block mb-2">Conferma Password</label>
            <input type="password" [(ngModel)]="confirm" name="confirm" required placeholder="••••••••"
                   class="w-full px-4 py-3 rounded-xl border border-outline-variant bg-surface font-inter text-sm focus:outline-none focus:border-primary transition-colors placeholder:text-on-surface-variant/40" />
          </div>
          <button type="submit" [disabled]="loading()"
                  class="mt-2 w-full py-3.5 bg-primary text-on-primary font-inter font-bold text-sm rounded-xl hover:opacity-90 transition-all uppercase tracking-wide flex items-center justify-center gap-2 disabled:opacity-60">
            @if (loading()) {
              <span class="material-symbols-outlined text-base spin">progress_activity</span>
              Registrazione in corso…
            } @else {
              <span class="material-symbols-outlined text-base" style="font-variation-settings:'FILL' 1">person_add</span>
              Registrati
            }
          </button>
        </form>

      }

    </div>
  </div>
</div>
